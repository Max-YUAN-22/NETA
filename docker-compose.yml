# NETA项目Docker配置
# 完整的MySQL + 后端 + 前端部署方案

# 1. Docker Compose主配置文件
version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: neta_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: neta_db
      MYSQL_USER: neta_user
      MYSQL_PASSWORD: neta_password
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init_neta_db.sql:/docker-entrypoint-initdb.d/init_neta_db.sql
      - ./database/backup:/backup
    ports:
      - "3306:3306"
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    networks:
      - neta_network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: neta_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - neta_network

  # Python后端API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neta_backend
    environment:
      DATABASE_URL: mysql://neta_user:neta_password@mysql:3306/neta_db
      REDIS_URL: redis://redis:6379
      FLASK_ENV: production
      FLASK_DEBUG: 0
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - neta_network

  # React前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neta_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - neta_network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: neta_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - neta_network

  # R Shiny应用（可选）
  shiny:
    build:
      context: ./shiny_app
      dockerfile: Dockerfile
    container_name: neta_shiny
    ports:
      - "3838:3838"
    volumes:
      - ./data:/app/data
      - ./shiny_app:/app
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - neta_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  neta_network:
    driver: bridge
